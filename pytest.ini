[pytest]
# Scope a bare ``pytest`` run to this repo's suite, matching
# ``make test`` (``unittest discover tests``). The vendored submodules
# (tmux-cli/, extensions/*) are separate repos with their own test
# harnesses and path setup; collecting them from here would fail on
# their independent import preludes. Run those from within their own
# directories.
testpaths = tests
norecursedirs = tmux-cli extensions static .git
